name: sql-repair-env

description: |
  An AI environment where an agent repairs broken SQL queries.
  The agent receives an incorrect SQL query and must generate a correct version.
  The query is executed in a SQLite environment and scored based on correctness.

version: "1.0"

observation_space:
  type: object
  properties:
    broken_query:
      type: string
    db_schema:
      type: string
    difficulty:
      type: string
    result:
      type: array
    error:
      type: string

action_space:
  type: object
  properties:
    query:
      type: string

reward_range: [0.0, 1.0]

tasks:
  - easy
  - medium
  - hard

environment_type: single-agent

evaluation:
  episodes: 10
  metric: average_reward