name: sql-repair-env

description: |
  An OpenEnv-compliant single-agent RL environment where an AI agent repairs
  broken SQL queries.
version: "1.0"

author: anik2411

entry_point: env.environment:SQLRepairEnv   # ✅ IMPORTANT

tags:
  - sql
  - nlp
  - code-repair
  - reinforcement-learning
  - sqlite
  - text2sql

observation_space:
  type: object
  properties:
    broken_query:
      type: string
    db_schema:
      type: string
    difficulty:
      type: string
      enum: [easy, medium, hard]
    result:
      type: array
      nullable: true
    error:
      type: string
      nullable: true

action_space:
  type: object
  properties:
    query:
      type: string

reward_range: [0.0, 1.0]

reward_description: |
  1.0 — Exact normalized query match
  0.8 — Output rows match expected result
  0.3 — Valid SELECT structure but wrong output
  0.0 — Syntax error or invalid query
tasks:
  - easy
  - medium
  - hard

environment_type: single-agent

evaluation:
  episodes: 10
  metric: average_reward
  success_threshold: 0.8